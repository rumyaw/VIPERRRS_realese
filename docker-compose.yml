services:
  postgres:
    image: postgres:16-alpine
    container_name: tramplin-postgres
    environment:
      POSTGRES_USER: tramplin
      POSTGRES_PASSWORD: tramplin
      POSTGRES_DB: tramplin
    ports:
      - "5432:5432"
    volumes:
      - tramplin_pg_data:/var/lib/postgresql/data
      - ./backend/internal/db/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tramplin -d tramplin"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tramplin-backend
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://tramplin:tramplin@postgres:5432/tramplin?sslmode=disable"
      JWT_SECRET: "change-me-in-production-min-32-chars-long"
      CORS_ORIGINS: "http://localhost,http://localhost:80,http://localhost:3000,http://127.0.0.1,http://127.0.0.1:3000"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_YANDEX_MAPS_API_KEY: "f0e8de45-f741-497b-bf91-92d52a17b41c"
        NEXT_PUBLIC_API_BASE_URL: "/api/v1"
    container_name: tramplin-frontend
    environment:
      NEXT_PUBLIC_YANDEX_MAPS_API_KEY: "f0e8de45-f741-497b-bf91-92d52a17b41c"
      NEXT_PUBLIC_API_BASE_URL: "/api/v1"
      PORT: "3000"
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "3000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: tramplin-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
      grafana:
        condition: service_started
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: tramplin-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8089:8080"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: tramplin-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      cadvisor:
        condition: service_started
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: tramplin-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: tramplin
      GF_INSTALL_PLUGINS: grafana-clock-panel
      GF_SERVER_ROOT_URL: http://localhost/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      # Вход через nginx auth proxy: email куратора из заголовка X-WEBAUTH-USER (подставляет nginx после проверки JWT)
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: X-WEBAUTH-USER
      GF_AUTH_PROXY_HEADER_PROPERTY: email
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
      GF_AUTH_PROXY_SYNC_TTL: "60"
      GF_USERS_ALLOW_SIGN_UP: "true"
      GF_USERS_AUTO_ASSIGN_ORG: "true"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: "Admin"
    depends_on:
      postgres:
        condition: service_healthy
      prometheus:
        condition: service_started
    ports:
      - "3001:3000"
    volumes:
      - tramplin_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped

volumes:
  tramplin_pg_data:
  tramplin_grafana_data:
