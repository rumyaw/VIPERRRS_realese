services:
  backend:
    build:
      context: ./backend
    environment:
      TRUMPLIN_DATABASE_DSN: file:/data/trumplin.db?_pragma=foreign_keys(1)&_pragma=busy_timeout(5000)
      TRUMPLIN_JWT_SECRET: change_me_super_secret
      TRUMPLIN_HTTP_PORT: 8080
      TRUMPLIN_CORS_ORIGIN: http://localhost:3000
      TRUMPLIN_ACCESS_TOKEN_TTL_SECONDS: 900
      TRUMPLIN_COOKIE_SECURE: 0
      TRUMPLIN_ADMIN_EMAIL: admin@example.com
      TRUMPLIN_ADMIN_PASSWORD: change_me_admin_password
      YANDEX_GEOCODER_KEY: ${YANDEX_GEOCODER_KEY:-f0e8de45-f741-497b-bf91-92d52a17b41c}
      YANDEX_GEOCODER_BASE_URL: https://geocode-maps.yandex.ru/1.x/
    ports:
      - "8080:8080"
    volumes:
      - trumplin_sqlite_data:/data

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
        NEXT_PUBLIC_YANDEX_API_KEY: ${YANDEX_JAVASCRIPT_API_KEY:-f0e8de45-f741-497b-bf91-92d52a17b41c}
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      NEXT_PUBLIC_YANDEX_API_KEY: ${YANDEX_JAVASCRIPT_API_KEY:-f0e8de45-f741-497b-bf91-92d52a17b41c}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  trumplin_sqlite_data:

