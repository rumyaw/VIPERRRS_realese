services:
  postgres:
    image: postgres:16-alpine
    container_name: tramplin-postgres
    environment:
      POSTGRES_USER: tramplin
      POSTGRES_PASSWORD: tramplin
      POSTGRES_DB: tramplin
    ports:
      - "5432:5432"
    volumes:
      - tramplin_pg_data:/var/lib/postgresql/data
      - ./backend/internal/db/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tramplin -d tramplin"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tramplin-backend
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://tramplin:tramplin@postgres:5432/tramplin?sslmode=disable"
      JWT_SECRET: "change-me-in-production-min-32-chars-long"
      CORS_ORIGINS: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_YANDEX_MAPS_API_KEY: "f0e8de45-f741-497b-bf91-92d52a17b41c"
        NEXT_PUBLIC_API_BASE_URL: "http://localhost:8080/api/v1"
    container_name: tramplin-frontend
    environment:
      NEXT_PUBLIC_YANDEX_MAPS_API_KEY: "f0e8de45-f741-497b-bf91-92d52a17b41c"
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8080/api/v1"
      PORT: "3000"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  tramplin_pg_data:
